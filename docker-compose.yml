version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile-fpm
    volumes:
      - ./app/:/var/www/html
    expose:
      - "9000"  # apenas exposto à rede interna

  nginx:
    image: nginx:latest
    volumes:
      - ./app/:/var/www/html
      - ./conf.d/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mysql_data:
