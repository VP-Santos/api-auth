services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_php
    volumes:
      - ./app/:/var/www/html
    expose:
      - "9000" 
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: ["php-fpm"]
    environment:
      AUTO_SETUP: "true"

  nginx:
    container_name: api_nginx
    image: nginx:latest
    volumes:
      - ./app/:/var/www/html
      - ./conf.d/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - php

  worker-supervisor:
    build: .
    container_name: api_worker
    volumes:
      - ./app/:/var/www/html
    depends_on:
      - php
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]

networks:
  api-auth-network:
    driver: bridge