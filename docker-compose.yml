services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_php
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env.example

  nginx:
    image: nginx:latest
    container_name: api_nginx
    ports:
      - "8080:80"
    volumes:
      - ./conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./app:/var/www/html
    depends_on:
      - php